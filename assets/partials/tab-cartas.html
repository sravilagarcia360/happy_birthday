<main id="tab-cartas" class="content-view hidden">
    <div class="billboard">
        <div class="billboard-image">
            <img src="https://images.unsplash.com/photo-1518599904199-0ca897819ddb?auto=format&fit=crop&q=80&w=1200" alt="Billboard">
            <div class="billboard-vignette"></div>
        </div>
        <div class="billboard-layer">
            <div class="billboard-content">
                <div class="logo-and-text">
                    <span class="n-icon">V</span><span class="original-text">S E R I E &nbsp; O R I G I N A L</span>
                </div>
                <h2 class="title-logo">Mi amor<br>por ti</h2>
                <p class="synopsis">Una colección de palabras no dichas, secretos a voces y todo el amor que me haces sentir. Abre esta carta magna para descubrir lo que hay en mi corazón.</p>
                <div class="billboard-buttons">
                    <button class="btn btn-play" onclick="cinematicCarta()">
                        <span class="icon">📖</span> Leer Carta Principal
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="sliders-container">
        <div class="slider-row" style="margin-bottom:0;">
            <h3 class="row-title">Pequeñas razones por las que te amo (¡Tócalas!)</h3>
            <div class="flip-items" id="slider-razones" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding-bottom: 30px; margin-top: 1.5rem;">
                <!-- Se ha delegado la generación de 50 cartas mágicas al archivo script.js -->
            </div>
        </div>
    </div>
    <footer class="netflix-footer"><p>Cartas Exclusivas 💚</p></footer>
</main>
